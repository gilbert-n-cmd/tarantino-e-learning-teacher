<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Teacher Dashboard</title>
<style>
  :root {
    --primary: #4a90e2;
    --secondary: #007bff;
    --danger: #dc3545;
    --light: #f5f6fa;
    --white: #fff;
  }

  body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: var(--light);
  }

  header {
    background: var(--primary);
    color: var(--white);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
  }

  header h1 {
    margin: 0;
    font-size: 22px;
  }

  .logout-btn {
    background: var(--danger);
    color: var(--white);
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  .logout-btn:hover { opacity: 0.85; }

  nav {
    background: var(--secondary);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 10px 0;
  }

  .nav-btn {
    background: var(--primary);
    color: var(--white);
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
  }
  .nav-btn:hover,
  .nav-btn.active {
    background: #0056b3;
  }

  main { padding: 25px; }

  section {
    display: none;
    background: var(--white);
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
  }

  section.active { display: block; }

  form input, form textarea, form select {
    width: 100%;
    padding: 8px;
    margin: 6px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  form button {
    background: var(--primary);
    color: var(--white);
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  form button:hover { opacity: 0.9; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }

  th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: left;
  }

  th {
    background: var(--primary);
    color: var(--white);
  }

  button.delete-btn {
    background: var(--danger);
    color: #fff;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
  }

  button.delete-btn:hover { opacity: 0.8; }

  @media (max-width: 768px) {
    nav { flex-direction: column; align-items: center; }
    .nav-btn { width: 90%; }
  }
</style>
</head>
<body>

<header>
  <h1>Teacher Dashboard</h1>
  <button class="logout-btn" id="logoutBtn">Logout</button>
</header>

<nav>
  <button class="nav-btn active" data-target="#addStudent">Add Student</button>
  <button class="nav-btn" data-target="#studentsList">Students List</button>
  <button class="nav-btn" data-target="#addQuiz">Add Quiz</button>
  <button class="nav-btn" data-target="#quizzesList">Quizzes List</button>
  <button class="nav-btn" data-target="#uploadNotes">Upload Notes</button>
  <button class="nav-btn" data-target="#notesList">Notes & Tutorials</button>
</nav>

<main>
  <!-- Add Student -->
  <section id="addStudent" class="active">
    <h2>Add Student</h2>
    <form id="studentForm">
      <input type="text" id="studentName" placeholder="Student Name" required>
      <input type="email" id="studentEmail" placeholder="Student Email" required>
      <select id="studentClass" required>
        <option value="" disabled selected>Select Class</option>
        <option value="P1">P1</option>
        <option value="P2">P2</option>
        <option value="P3">P3</option>
        <option value="P4">P4</option>
        <option value="P5">P5</option>
        <option value="P6">P6</option>
        <option value="P7">P7</option>
      </select>
      <button type="submit">Add Student</button>
    </form>
  </section>

  <!-- Students List -->
  <section id="studentsList">
    <h2>Students List</h2>
    <table>
      <thead><tr><th>Name</th><th>Email</th><th>Class</th><th>Action</th></tr></thead>
      <tbody id="studentsTable"></tbody>
    </table>
  </section>

  <!-- Add Quiz -->
  <section id="addQuiz">
    <h2>Add Quiz</h2>
    <form id="quizForm">
      <input type="text" id="quizTitle" placeholder="Quiz Title" required>
      <textarea id="quizDescription" placeholder="Quiz Description" rows="3" required></textarea>
      <input type="url" id="quizLink" placeholder="Google Form Link" required>
      <label>Open Time:</label>
      <input type="datetime-local" id="openTime" required>
      <label>Close Time:</label>
      <input type="datetime-local" id="closeTime" required>
      <button type="submit">Add Quiz</button>
    </form>
  </section>

  <!-- Quizzes List -->
  <section id="quizzesList">
    <h2>Quizzes List</h2>
    <table>
      <thead><tr><th>Title</th><th>Description</th><th>Open</th><th>Close</th><th>Action</th></tr></thead>
      <tbody id="quizzesTable"></tbody>
    </table>
  </section>

  <!-- Upload Notes -->
  <section id="uploadNotes">
    <h2>Upload Notes</h2>
    <form id="notesForm">
      <input type="text" id="noteTitle" placeholder="Note Title" required>
      <input type="url" id="noteLink" placeholder="Link to Notes (Google Drive, etc.)" required>
      <button type="submit">Upload</button>
    </form>
  </section>

  <!-- Notes List -->
  <section id="notesList">
    <h2>Notes & Tutorials List</h2>
    <table>
      <thead><tr><th>Title</th><th>Link</th><th>Action</th></tr></thead>
      <tbody id="notesTable"></tbody>
    </table>
  </section>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  deleteDoc,
  query
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

import {
  getAuth,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDv0wNHZl4wSXd10B7tr9Br-7phWidLDaU",
  authDomain: "tarantino-e-learning.firebaseapp.com",
  projectId: "tarantino-e-learning",
  storageBucket: "tarantino-e-learning.firebasestorage.app",
  messagingSenderId: "501202693775",
  appId: "1:501202693775:web:fabc3af9989542c9a18afa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

  // Navigation
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
      btn.classList.add("active");
      document.querySelector(btn.dataset.target).classList.add("active");
    });
  });

  // Auth check
  onAuthStateChanged(auth, user => {
    if (!user) window.location.href = "teacher_login.html";
  });

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "teacher_login.html";
  });

  // Add student
  const studentForm = document.getElementById("studentForm");
  const studentsTable = document.getElementById("studentsTable");

  studentForm.addEventListener("submit", async e => {
    e.preventDefault();
    try {
      const name = studentName.value.trim();
      const email = studentEmail.value.trim();
      const studentClassVal = studentClass.value;
      await addDoc(collection(db, "students"), { name, email, class: studentClassVal });
      alert("✅ Student added!");
      e.target.reset();
      loadStudents();
    } catch (err) {
      alert(err.message);
    }
  });

  async function loadStudents() {
    const snap = await getDocs(query(collection(db, "students")));
    studentsTable.innerHTML = "";
    snap.forEach(docSnap => {
      const s = docSnap.data();
      const id = docSnap.id;
      studentsTable.innerHTML += `
        <tr>
          <td>${s.name}</td>
          <td>${s.email}</td>
          <td>${s.class}</td>
          <td><button class="delete-btn" onclick="deleteStudent('${id}')">Delete</button></td>
        </tr>`;
    });
  }

  window.deleteStudent = async function(id) {
    if (confirm("Are you sure you want to delete this student?")) {
      await deleteDoc(doc(db, "students", id));
      alert("✅ Student deleted!");
      loadStudents();
    }
  }

  // Quiz functions
  const quizForm = document.getElementById("quizForm");
  const quizzesTable = document.getElementById("quizzesTable");

  quizForm.addEventListener("submit", async e => {
    e.preventDefault();
    try {
      const data = {
        title: quizTitle.value.trim(),
        description: quizDescription.value.trim(),
        link: quizLink.value.trim(),
        open: openTime.value,
        close: closeTime.value,
        created: new Date()
      };
      await addDoc(collection(db, "teacher_quizzes"), data);
      alert("✅ Quiz added!");
      e.target.reset();
      loadQuizzes();
    } catch (err) {
      alert(err.message);
    }
  });

  async function loadQuizzes() {
    const snap = await getDocs(query(collection(db, "teacher_quizzes")));
    quizzesTable.innerHTML = "";
    if (snap.empty) {
      quizzesTable.innerHTML = "<tr><td colspan='5'>No quizzes yet</td></tr>";
      return;
    }
    snap.forEach(docSnap => {
      const qz = docSnap.data();
      const id = docSnap.id;
      quizzesTable.innerHTML += `
        <tr>
          <td>${qz.title}</td>
          <td>${qz.description}</td>
          <td>${qz.open}</td>
          <td>${qz.close}</td>
          <td><button class="delete-btn" onclick="deleteQuiz('${id}')">Delete</button></td>
        </tr>`;
    });
  }

  window.deleteQuiz = async function(id) {
    if (confirm("Are you sure you want to delete this quiz?")) {
      await deleteDoc(doc(db, "teacher_quizzes", id));
      alert("✅ Quiz deleted!");
      loadQuizzes();
    }
  }

  // Notes functions
  const notesForm = document.getElementById("notesForm");
  const notesTable = document.getElementById("notesTable");

  notesForm.addEventListener("submit", async e => {
    e.preventDefault();
    try {
      await addDoc(collection(db, "notes"), {
        title: noteTitle.value.trim(),
        link: noteLink.value.trim()
      });
      alert("✅ Note uploaded!");
      e.target.reset();
      loadNotes();
    } catch (err) {
      alert(err.message);
    }
  });

  async function loadNotes() {
    const snap = await getDocs(query(collection(db, "notes")));
    notesTable.innerHTML = "";
    if (snap.empty) {
      notesTable.innerHTML = "<tr><td colspan='3'>No notes yet</td></tr>";
      return;
    }
    snap.forEach(docSnap => {
      const n = docSnap.data();
      const id = docSnap.id;
      notesTable.innerHTML += `
        <tr>
          <td>${n.title}</td>
          <td><a href="${n.link}" target="_blank">View</a></td>
          <td><button class="delete-btn" onclick="deleteNote('${id}')">Delete</button></td>
        </tr>`;
    });
  }

  window.deleteNote = async function(id) {
    if (confirm("Are you sure you want to delete this note?")) {
      await deleteDoc(doc(db, "notes", id));
      alert("✅ Note deleted!");
      loadNotes();
    }
  }

  // Initial load
  loadStudents();
  loadQuizzes();
  loadNotes();
</script>
</body>
</html>
